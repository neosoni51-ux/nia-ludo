<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nia Premium Ludo 🍷</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <!-- Confetti Animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="app-container">
        
        <!-- Main Game Area -->
        <div id="game-area">
            <header class="glass-header">
                <div class="user-info">
                    <img id="user-dp" src="assets/default.png" alt="DP">
                    <span id="user-name">Loading...</span>
                </div>
                <div class="room-info">
                    Room: <span id="display-room-code">----</span>
                </div>
                <div class="spectator-info">
                    👁 <span id="spectator-count">0</span>
                </div>
            </header>

            <div id="menu-screen" class="glass-panel">
                <h1>Nɪᴀ Lᴜᴅᴏ 🍷</h1>
                <button id="create-btn" class="glow-btn">Create Private Room</button>
                <div class="join-section">
                    <input type="text" id="join-code" placeholder="Enter Room Code" autocomplete="off">
                    <button id="join-btn" class="glow-btn outline">Join Room</button>
                </div>
            </div>

            <!-- Visual Ludo Board Placeholder -->
            <div id="ludo-board" style="display: none;">
                <div class="board-grid">
                    <!-- Board rendering logic goes here via JS -->
                    <div class="center-home">⭐</div>
                </div>
                <div class="controls">
                    <button id="roll-dice-btn" class="glow-btn">🎲 Roll Dice</button>
                    <div id="dice-result">--</div>
                </div>
            </div>
        </div>

        <!-- Right Side Live Chat -->
        <div id="chat-panel" class="glass-panel">
            <div class="chat-header">Live Chat 💬</div>
            <div id="chat-messages">
                <!-- Messages will appear here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-msg-btn">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
